status = error
name = Log4j2PropertiesConfig

# Console Appender
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# File Appender
appender.file.type = File
appender.file.name = File
appender.file.fileName = applogs/log4j2-file.log
appender.file.append = false
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Rolling File Appender
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = applogs/log4j2-rolling.log
appender.rolling.filePattern = applogs/log4j2-rolling-%d{yyyy-MM-dd}-%i.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 1 KB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10

# Daily Rolling File Appender
appender.daily.type = RollingFile
appender.daily.name = DailyRollingFile
appender.daily.fileName = applogs/log4j2-daily.log
appender.daily.filePattern = applogs/log4j2-daily-%d{yyyy-MM-dd}.log
appender.daily.layout.type = PatternLayout
appender.daily.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.daily.policies.type = Policies
appender.daily.policies.time.type = TimeBasedTriggeringPolicy
appender.daily.policies.time.interval = 1
appender.daily.policies.time.modulate = true

# Random Access File Appender
appender.randomAccess.type = RandomAccessFile
appender.randomAccess.name = RandomAccessFile
appender.randomAccess.fileName = applogs/log4j2-randomaccess.log
appender.randomAccess.append = true
appender.randomAccess.immediateFlush = true
appender.randomAccess.layout.type = PatternLayout
appender.randomAccess.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Memory Mapped File Appender
appender.memoryMapped.type = MemoryMappedFile
appender.memoryMapped.name = MemoryMappedFile
appender.memoryMapped.fileName = applogs/log4j2-memorymapped.log
appender.memoryMapped.append = true
appender.memoryMapped.immediateFlush = true
appender.memoryMapped.regionLength = 33554432
appender.memoryMapped.layout.type = PatternLayout
appender.memoryMapped.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Root Logger
rootLogger.level = debug
rootLogger.appenderRefs = console, file, rolling, daily, randomAccess, memoryMapped
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File
rootLogger.appenderRef.rolling.ref = RollingFile
rootLogger.appenderRef.daily.ref = DailyRollingFile
rootLogger.appenderRef.randomAccess.ref = RandomAccessFile
rootLogger.appenderRef.memoryMapped.ref = MemoryMappedFile